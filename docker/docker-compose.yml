services:
  fts:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: heartbeat-fts
    restart: unless-stopped
    ports:
      - "${COT_PORT:-8087}:${COT_PORT:-8087}"
      - "${SSL_COT_PORT:-8089}:${SSL_COT_PORT:-8089}"
      - "${API_PORT:-19023}:${API_PORT:-19023}"
      - "${DATAPACKAGE_PORT:-8443}:8443"
    volumes:
      - ./data:/opt/fts/data
      - ./logs:/opt/fts/logs
      - ./certs:/opt/fts/certs
    environment:
      - FTS_CONNECTION_MESSAGE=${FTS_CONNECTION_MSG:-Welcome to Heartbeat TAK}
      - SERVER_IP=${SERVER_IP:-0.0.0.0}
      - COT_PORT=${COT_PORT:-8087}
      - SSL_COT_PORT=${SSL_COT_PORT:-8089}
      - API_PORT=${API_PORT:-19023}
      - DATAPACKAGE_PORT=${DATAPACKAGE_PORT:-8443}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket,os; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',int(os.environ.get('COT_PORT',8087)))); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
