<!DOCTYPE html>
<html>
<head>
    <title>CoTView</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }

        .track-count {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 14px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .connection-status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 1000;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 12px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .connected {
            background: #4AD94A;
            color: white;
        }

        .disconnected {
            background: #D94A4A;
            color: white;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="track-count">Tracks: <span id="count">0</span></div>
    <div class="connection-status disconnected" id="status">Disconnected</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const wsProto = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const CONFIG = {
            wsUrl: `${wsProto}://${window.location.host}/ws`,
            centerLat: {{CENTER_LAT}},
            centerLon: {{CENTER_LON}},
            centerZoom: {{CENTER_ZOOM}},
        };

        const map = L.map('map').setView([CONFIG.centerLat, CONFIG.centerLon], CONFIG.centerZoom);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '\u00a9 OpenStreetMap'
        }).addTo(map);

        const markers = {};

        const COLORS = {
            'f': '#4A90D9',
            'h': '#D94A4A',
            'n': '#4AD94A',
            'u': '#D9D94A',
            'a': '#D9D94A',
            'p': '#A64AD9',
            's': '#4AD9D9',
        };

        function getColor(cotType) {
            const parts = (cotType || '').split('-');
            const aff = parts[1] || 'u';
            return COLORS[aff] || '#888888';
        }

        function createMarkerIcon(color) {
            return L.divIcon({
                className: 'track-marker',
                html: `<div style="
                    width: 12px;
                    height: 12px;
                    background: ${color};
                    border: 2px solid white;
                    border-radius: 50%;
                    box-shadow: 0 0 4px rgba(0,0,0,0.5);
                "></div>`,
                iconSize: [16, 16],
                iconAnchor: [8, 8],
            });
        }

        function updateTrack(track) {
            const color = getColor(track.type);
            const icon = createMarkerIcon(color);
            const lat = Number(track.lat);
            const lon = Number(track.lon);

            if (markers[track.uid]) {
                markers[track.uid].setLatLng([lat, lon]);
                markers[track.uid].setIcon(icon);
            } else {
                markers[track.uid] = L.marker([lat, lon], { icon })
                    .addTo(map)
                    .bindPopup('');
            }

            const alt = Number(track.alt || 0).toFixed(1);
            const team = track.team ? `Team: ${track.team}<br>` : '';
            markers[track.uid].setPopupContent(`
                <b>${track.callsign || track.uid}</b><br>
                UID: ${track.uid}<br>
                Type: ${track.type || ''}<br>
                Alt: ${alt}m<br>
                ${team}
            `);

            document.getElementById('count').textContent = Object.keys(markers).length;
        }

        function removeTrack(uid) {
            if (markers[uid]) {
                map.removeLayer(markers[uid]);
                delete markers[uid];
            }
            document.getElementById('count').textContent = Object.keys(markers).length;
        }

        function connect() {
            const ws = new WebSocket(CONFIG.wsUrl);
            const statusEl = document.getElementById('status');

            ws.onopen = () => {
                statusEl.textContent = 'Connected';
                statusEl.className = 'connection-status connected';
            };

            ws.onclose = () => {
                statusEl.textContent = 'Disconnected';
                statusEl.className = 'connection-status disconnected';
                setTimeout(connect, 2000);
            };

            ws.onerror = () => ws.close();

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'update') {
                    updateTrack(msg.track);
                } else if (msg.type === 'remove') {
                    removeTrack(msg.uid);
                }
            };
        }

        connect();
    </script>
</body>
</html>
