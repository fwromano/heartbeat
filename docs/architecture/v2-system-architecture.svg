<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="Consolas, 'Courier New', monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/><stop offset="100%" style="stop-color:#101d35"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#182b48"/><stop offset="100%" style="stop-color:#142035"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/></filter>
    <filter id="glow"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#00b4d8" flood-opacity="0.15"/></filter>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#3a5a7a"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2ecc71"/></marker>
    <marker id="ao" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f4a261"/></marker>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- ═══ TITLE ═══ -->
  <text x="960" y="52" text-anchor="middle" fill="#d8e4f0" font-size="30" font-weight="bold" letter-spacing="6">HEARTBEAT</text>
  <text x="960" y="78" text-anchor="middle" fill="#4a6a8a" font-size="13" letter-spacing="3">SYSTEM ARCHITECTURE</text>
  <line x1="400" y1="95" x2="1520" y2="95" stroke="#1a2a40" stroke-width="1"/>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!--  ZONE A  —  ORCHESTRATION (left)                                -->
  <!-- ════════════════════════════════════════════════════════════════ -->

  <rect x="50" y="115" width="490" height="555" rx="10" fill="none" stroke="#1a2a40" stroke-width="1"/>
  <text x="75" y="142" fill="#4a6a8a" font-size="11" letter-spacing="2">ORCHESTRATION</text>

  <!-- CLI -->
  <rect x="75" y="160" width="440" height="80" rx="8" fill="url(#cardGrad)" filter="url(#sh)"/>
  <rect x="75" y="160" width="440" height="4" rx="2" fill="#00b4d8"/>
  <text x="105" y="192" fill="#00b4d8" font-size="18" font-weight="bold">CLI</text>
  <text x="165" y="192" fill="#607890" font-size="12">./heartbeat</text>
  <text x="105" y="218" fill="#8098b0" font-size="11">18 commands · 310 lines · prefix-matched dispatch</text>

  <line x1="295" y1="240" x2="295" y2="264" stroke="#3a5a7a" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Control Plane -->
  <rect x="75" y="270" width="440" height="72" rx="8" fill="url(#cardGrad)" filter="url(#sh)"/>
  <rect x="75" y="270" width="4" height="72" rx="2" fill="#6c63ff"/>
  <text x="105" y="300" fill="#8b80ff" font-size="16" font-weight="bold">Control Plane</text>
  <text x="105" y="322" fill="#8098b0" font-size="11">Lifecycle · backend loading · capability routing</text>

  <line x1="295" y1="342" x2="295" y2="366" stroke="#3a5a7a" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Lifecycle -->
  <rect x="75" y="372" width="440" height="170" rx="8" fill="url(#cardGrad)" filter="url(#sh)"/>
  <rect x="75" y="372" width="4" height="170" rx="2" fill="#f4a261"/>
  <text x="105" y="402" fill="#f4a261" font-size="16" font-weight="bold">Lifecycle Sequences</text>

  <text x="105" y="432" fill="#2ecc71" font-size="13" font-weight="bold">start</text>
  <text x="185" y="432" fill="#8098b0" font-size="11">provision → config → recorder</text>

  <text x="105" y="458" fill="#e76f51" font-size="13" font-weight="bold">stop</text>
  <text x="185" y="458" fill="#8098b0" font-size="11">recorder → export .gpkg → backend</text>

  <text x="105" y="484" fill="#00b4d8" font-size="13" font-weight="bold">restart</text>
  <text x="185" y="484" fill="#8098b0" font-size="11">reset deps (clear stale broker)</text>

  <text x="105" y="510" fill="#bb77dd" font-size="13" font-weight="bold">reset</text>
  <text x="185" y="510" fill="#8098b0" font-size="11">full dependency chain recycle</text>

  <text x="105" y="534" fill="#4a6a8a" font-size="10">Mission → stop → GIS artifact automatically</text>

  <!-- Identity -->
  <rect x="75" y="558" width="440" height="96" rx="8" fill="url(#cardGrad)" filter="url(#sh)"/>
  <rect x="75" y="558" width="4" height="96" rx="2" fill="#bb77dd"/>
  <text x="105" y="588" fill="#bb77dd" font-size="16" font-weight="bold">Identity + Onboarding</text>
  <text x="105" y="612" fill="#8098b0" font-size="11">Package generation · cert provisioning · QR</text>
  <text x="105" y="632" fill="#8098b0" font-size="11">HTTP serve :9000 · Tailscale VPN detection</text>
  <text x="105" y="648" fill="#e76f51" font-size="9">One unique cert per device — shared reuse breaks routing</text>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!--  ZONE B  —  BACKENDS (center)                                   -->
  <!-- ════════════════════════════════════════════════════════════════ -->

  <rect x="570" y="115" width="720" height="555" rx="10" fill="none" stroke="#1a2a40" stroke-width="1"/>
  <text x="595" y="142" fill="#4a6a8a" font-size="11" letter-spacing="2">BACKEND PLANE</text>
  <text x="1125" y="142" fill="#3a4a5a" font-size="10" text-anchor="end">pluggable adapters behind shared interface contract</text>

  <!-- Arrow from control plane → backends -->
  <line x1="515" y1="306" x2="570" y2="306" stroke="#3a5a7a" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- FreeTAK -->
  <rect x="595" y="165" width="340" height="240" rx="8" fill="url(#cardGrad)" filter="url(#sh)"/>
  <rect x="595" y="165" width="340" height="5" rx="2" fill="#40916c"/>
  <text x="625" y="200" fill="#40916c" font-size="20" font-weight="bold">FreeTAK</text>
  <text x="625" y="224" fill="#607890" font-size="12">Lite tier</text>

  <text x="625" y="260" fill="#8098b0" font-size="12">TCP CoT :8087</text>
  <text x="625" y="282" fill="#8098b0" font-size="12">Docker or Python venv</text>
  <text x="625" y="304" fill="#8098b0" font-size="12">No cert identity</text>
  <text x="625" y="326" fill="#607890" font-size="11">Lower friction model</text>

  <rect x="625" y="368" width="120" height="24" rx="12" fill="#1a3020"/>
  <text x="685" y="385" text-anchor="middle" fill="#40916c" font-size="10" font-weight="bold">IMPLEMENTED</text>

  <!-- OpenTAK -->
  <rect x="955" y="165" width="315" height="240" rx="8" fill="url(#cardGrad)" filter="url(#sh)"/>
  <rect x="955" y="165" width="315" height="5" rx="2" fill="#00b4d8"/>
  <text x="985" y="200" fill="#00b4d8" font-size="20" font-weight="bold">OpenTAK</text>
  <text x="985" y="224" fill="#607890" font-size="12">Standard tier</text>

  <text x="985" y="260" fill="#8098b0" font-size="12">SSL/mTLS CoT :8089</text>
  <text x="985" y="282" fill="#8098b0" font-size="12">WebTAK :8443 via Nginx</text>
  <text x="985" y="304" fill="#8098b0" font-size="12">systemd · RabbitMQ · PostgreSQL</text>
  <text x="985" y="326" fill="#607890" font-size="11">Cert-backed identity</text>

  <rect x="985" y="368" width="120" height="24" rx="12" fill="#0a2030"/>
  <text x="1045" y="385" text-anchor="middle" fill="#00b4d8" font-size="10" font-weight="bold">IMPLEMENTED</text>

  <!-- TAK Server -->
  <rect x="595" y="425" width="675" height="95" rx="8" fill="#0e1520" stroke="#1a2535" stroke-width="1"/>
  <text x="625" y="460" fill="#3a4a5a" font-size="20" font-weight="bold">TAK Server</text>
  <text x="835" y="460" fill="#2a3a4a" font-size="12">Enterprise tier</text>
  <text x="625" y="486" fill="#2a3a4a" font-size="12">tak.gov · Full PKI · Federation Hub · group-based filtering</text>
  <text x="1230" y="486" fill="#e76f51" font-size="10" text-anchor="end">BACKLOG</text>

  <!-- Runtime services -->
  <rect x="595" y="540" width="675" height="115" rx="8" fill="url(#cardGrad)" filter="url(#sh)"/>
  <rect x="595" y="540" width="675" height="4" rx="2" fill="#e76f51"/>
  <text x="625" y="572" fill="#e76f51" font-size="15" font-weight="bold">Runtime Services</text>
  <text x="850" y="572" fill="#607890" font-size="11">long-lived processes managed by backend</text>

  <rect x="625" y="590" width="275" height="50" rx="6" fill="#1e3350"/>
  <text x="645" y="614" fill="#40916c" font-size="12" font-weight="bold">FreeTAK</text>
  <text x="645" y="632" fill="#607890" font-size="10">Docker container or venv</text>

  <rect x="920" y="590" width="330" height="50" rx="6" fill="#1e3350"/>
  <text x="940" y="614" fill="#00b4d8" font-size="12" font-weight="bold">OpenTAK</text>
  <text x="940" y="632" fill="#607890" font-size="10">rabbitmq · postgresql · nginx · OTS</text>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!--  ZONE C  —  DATA PIPELINE (right)                               -->
  <!-- ════════════════════════════════════════════════════════════════ -->

  <rect x="1320" y="115" width="560" height="555" rx="10" fill="none" stroke="#1a2a40" stroke-width="1"/>
  <text x="1345" y="142" fill="#4a6a8a" font-size="11" letter-spacing="2">DATA PIPELINE</text>

  <!-- Arrow from backends → data pipeline -->
  <line x1="1290" y1="306" x2="1320" y2="306" stroke="#3a5a7a" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Recorder -->
  <rect x="1345" y="165" width="510" height="100" rx="8" fill="url(#cardGrad)" filter="url(#sh)"/>
  <rect x="1345" y="165" width="510" height="5" rx="2" fill="#f4a261"/>
  <text x="1375" y="198" fill="#f4a261" font-size="18" font-weight="bold">Recorder</text>
  <text x="1375" y="224" fill="#8098b0" font-size="11">Local client consumer · CoT stream framing + XML parse</text>
  <text x="1375" y="246" fill="#607890" font-size="10">SA keepalive 240s · auto-reconnect · OTS: localhost SSL :8089</text>

  <line x1="1600" y1="265" x2="1600" y2="290" stroke="#f4a261" stroke-width="1.5" marker-end="url(#ao)"/>

  <!-- SQLite -->
  <rect x="1345" y="296" width="510" height="120" rx="8" fill="url(#cardGrad)" filter="url(#sh)"/>
  <rect x="1345" y="296" width="4" height="120" rx="2" fill="#40916c"/>
  <text x="1375" y="328" fill="#40916c" font-size="18" font-weight="bold">SQLite</text>
  <text x="1500" y="328" fill="#607890" font-size="12">WAL mode · session-scoped</text>

  <rect x="1375" y="344" width="155" height="26" rx="4" fill="#1e3350"/>
  <text x="1385" y="362" fill="#00b4d8" font-size="10">recording_sessions</text>

  <rect x="1545" y="344" width="105" height="26" rx="4" fill="#1e3350"/>
  <text x="1555" y="362" fill="#f4a261" font-size="10">cot_events</text>

  <rect x="1665" y="344" width="165" height="26" rx="4" fill="#1e3350"/>
  <text x="1675" y="362" fill="#bb77dd" font-size="10">cot_geometry_points</text>

  <text x="1375" y="400" fill="#607890" font-size="10">UNIQUE(uid, time) dedup · ordered vertices for lines/polygons</text>

  <line x1="1600" y1="416" x2="1600" y2="440" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Export -->
  <rect x="1345" y="446" width="510" height="100" rx="8" fill="url(#cardGrad)" filter="url(#sh)"/>
  <rect x="1345" y="446" width="4" height="100" rx="2" fill="#2ecc71"/>
  <text x="1375" y="478" fill="#2ecc71" font-size="18" font-weight="bold">Export</text>
  <text x="1375" y="504" fill="#8098b0" font-size="11">Classify geometry · raw CoT-type layers or GCM mode</text>
  <text x="1375" y="526" fill="#607890" font-size="10">NO GDAL · shapely + sqlite3 · OGC GeoPackage · EPSG:4326</text>

  <line x1="1600" y1="546" x2="1600" y2="568" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Output -->
  <rect x="1345" y="574" width="510" height="80" rx="8" fill="url(#cardGrad)" filter="url(#glow)"/>
  <rect x="1345" y="574" width="510" height="5" rx="2" fill="#bb77dd"/>
  <text x="1375" y="608" fill="#bb77dd" font-size="18" font-weight="bold">.gpkg</text>
  <text x="1475" y="608" fill="#607890" font-size="12">GIS-ready artifact</text>
  <text x="1375" y="636" fill="#8098b0" font-size="11">Point · LineString · Polygon · Circle→Polygon</text>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!--  NETWORK + CLIENTS                                              -->
  <!-- ════════════════════════════════════════════════════════════════ -->

  <rect x="50" y="690" width="1830" height="30" rx="6" fill="#0c1825" stroke="#1a2a40" stroke-width="1"/>
  <text x="960" y="711" text-anchor="middle" fill="#4a7a9a" font-size="14" font-weight="bold" letter-spacing="5">TAILSCALE VPN MESH</text>

  <!-- TAK Clients -->
  <rect x="50" y="735" width="930" height="60" rx="8" fill="url(#cardGrad)" filter="url(#sh)"/>
  <text x="80" y="764" fill="#00b4d8" font-size="16" font-weight="bold">TAK Clients</text>
  <text x="260" y="764" fill="#8098b0" font-size="12">iTAK · ATAK · WinTAK · WebTAK</text>
  <text x="80" y="784" fill="#607890" font-size="10">SSL :8089 · WebTAK :8443 · Packages :9000</text>

  <!-- GIS Consumers -->
  <rect x="1000" y="735" width="880" height="60" rx="8" fill="url(#cardGrad)" filter="url(#sh)"/>
  <text x="1030" y="764" fill="#f4a261" font-size="16" font-weight="bold">GIS Consumers</text>
  <text x="1230" y="764" fill="#8098b0" font-size="12">QGIS · ArcGIS · GeoPandas</text>
  <text x="1030" y="784" fill="#607890" font-size="10">.gpkg artifacts with rich attributes + style metadata</text>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!--  BOTTOM — CONSTRAINTS + PRINCIPLES                              -->
  <!-- ════════════════════════════════════════════════════════════════ -->

  <!-- Constraints -->
  <rect x="50" y="815" width="930" height="145" rx="8" fill="#14120a" stroke="#e76f51" stroke-width="1" stroke-opacity="0.5"/>
  <text x="80" y="845" fill="#e76f51" font-size="15" font-weight="bold">Critical Constraints</text>

  <text x="80" y="878" fill="#c8d0d8" font-size="12" font-weight="bold">SSL recorder path required</text>
  <text x="430" y="878" fill="#8098b0" font-size="11">Plain TCP misses routed annotations — recorder must use localhost SSL</text>

  <text x="80" y="908" fill="#c8d0d8" font-size="12" font-weight="bold">One cert per physical device</text>
  <text x="430" y="908" fill="#8098b0" font-size="11">Shared packages break multi-device routing under OpenTAK</text>

  <text x="80" y="938" fill="#c8d0d8" font-size="12" font-weight="bold">Zero events ≠ exporter bug</text>
  <text x="430" y="938" fill="#8098b0" font-size="11">Indicates transport or auth mismatch — PID alive ≠ events captured</text>

  <!-- Design Principles -->
  <rect x="1000" y="815" width="880" height="145" rx="8" fill="url(#cardGrad)" filter="url(#sh)"/>
  <rect x="1000" y="815" width="880" height="4" rx="2" fill="#8b80ff"/>
  <text x="1030" y="845" fill="#8b80ff" font-size="15" font-weight="bold">Design Principles</text>

  <text x="1030" y="878" fill="#8098b0" font-size="12">Backend logic in adapters, never in CLI core</text>
  <text x="1030" y="902" fill="#8098b0" font-size="12">Abstract interface contract keeps orchestration portable</text>
  <text x="1030" y="926" fill="#8098b0" font-size="12">Data transforms isolated from writer and lifecycle concerns</text>
  <text x="1030" y="950" fill="#607890" font-size="10">Config generated at runtime, read dynamically — separation keeps system maintainable</text>

  <!-- ─── END-TO-END ─── -->
  <rect x="50" y="978" width="1830" height="38" rx="6" fill="#0c1520" stroke="#1a2a40" stroke-width="0.5"/>
  <text x="960" y="1003" text-anchor="middle" fill="#4a6a8a" font-size="12">CLI → Control Plane → Backend Adapter → TAK Services → CoT Routing → Recorder → Parser → SQLite → Exporter → GeoPackage → GIS</text>

  <!-- 5 Jobs -->
  <text x="80" y="1045" fill="#00b4d8" font-size="11" font-weight="bold">5 JOBS</text>
  <text x="165" y="1045" fill="#607890" font-size="11">① Provision backend</text>
  <text x="420" y="1045" fill="#607890" font-size="11">② Onboard devices</text>
  <text x="670" y="1045" fill="#607890" font-size="11">③ Capture live CoT</text>
  <text x="960" y="1045" fill="#607890" font-size="11">④ Persist sessions</text>
  <text x="1240" y="1045" fill="#607890" font-size="11">⑤ Export .gpkg</text>

  <text x="1880" y="22" text-anchor="end" fill="#2a3a50" font-size="10">v2</text>
</svg>