<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Consolas, 'Courier New', monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#122040;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2d4a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#152238;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d6a4f"/>
      <stop offset="100%" style="stop-color:#40916c"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e76f51"/>
      <stop offset="100%" style="stop-color:#f4a261"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00b4d8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#40916c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f4a261"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#e0e0e0" font-size="22" font-weight="bold" letter-spacing="3">HEARTBEAT — SYSTEM ARCHITECTURE</text>
  <line x1="200" y1="80" x2="1000" y2="80" stroke="#1a3050" stroke-width="1"/>

  <!-- ════════ FIELD LAPTOP BOX ════════ -->
  <rect x="30" y="100" width="780" height="680" rx="8" fill="none" stroke="#1a3050" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="50" y="125" fill="#5a7a9a" font-size="11" letter-spacing="2">FIELD LAPTOP (HEARTBEAT HOST)</text>

  <!-- CLI Layer -->
  <rect x="60" y="145" width="720" height="70" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="60" y="145" width="5" height="70" rx="2" fill="url(#accentGrad)"/>
  <text x="85" y="170" fill="#00b4d8" font-size="14" font-weight="bold">CLI LAYER</text>
  <text x="85" y="190" fill="#a0b8d0" font-size="11">./heartbeat start | stop | restart | reset | status | record | export | qr | package | serve</text>
  <text x="85" y="205" fill="#607890" font-size="10">heartbeat (310 lines bash) — prefix-matched commands — 18 total</text>

  <!-- Backend Interface -->
  <rect x="60" y="230" width="720" height="55" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="60" y="230" width="5" height="55" rx="2" fill="#6c63ff"/>
  <text x="85" y="252" fill="#8b80ff" font-size="13" font-weight="bold">BACKEND INTERFACE</text>
  <text x="85" y="268" fill="#a0b8d0" font-size="10">lib/backends/interface.sh — start / stop / reset / status / health_check / supports</text>

  <!-- Three backends -->
  <rect x="60" y="300" width="220" height="110" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="60" y="300" width="220" height="4" rx="2" fill="url(#greenGrad)"/>
  <text x="170" y="325" text-anchor="middle" fill="#40916c" font-size="13" font-weight="bold">FreeTAK (Lite)</text>
  <text x="170" y="345" text-anchor="middle" fill="#a0b8d0" font-size="10">TCP only · No auth · Docker/venv</text>
  <text x="170" y="362" text-anchor="middle" fill="#607890" font-size="10">CoT :8087 · REST :19023</text>
  <text x="170" y="379" text-anchor="middle" fill="#607890" font-size="10">DataPkg :8443</text>
  <text x="170" y="400" text-anchor="middle" fill="#40916c" font-size="9">✓ IMPLEMENTED</text>

  <rect x="310" y="300" width="220" height="110" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="310" y="300" width="220" height="4" rx="2" fill="url(#accentGrad)"/>
  <text x="420" y="325" text-anchor="middle" fill="#00b4d8" font-size="13" font-weight="bold">OpenTAK (Standard)</text>
  <text x="420" y="345" text-anchor="middle" fill="#a0b8d0" font-size="10">SSL + WebTAK · Native systemd</text>
  <text x="420" y="362" text-anchor="middle" fill="#607890" font-size="10">CoT :8088 · SSL :8089 · Web :8443</text>
  <text x="420" y="379" text-anchor="middle" fill="#607890" font-size="10">Flask :8081 · RabbitMQ · PostgreSQL</text>
  <text x="420" y="400" text-anchor="middle" fill="#00b4d8" font-size="9">✓ IMPLEMENTED (forked OTS)</text>

  <rect x="560" y="300" width="220" height="110" rx="6" fill="#111a2a" filter="url(#shadow)"/>
  <rect x="560" y="300" width="220" height="4" rx="2" fill="#444"/>
  <text x="670" y="325" text-anchor="middle" fill="#555" font-size="13" font-weight="bold">TAK Server (Enterprise)</text>
  <text x="670" y="345" text-anchor="middle" fill="#444" font-size="10">tak.gov · Full federation</text>
  <text x="670" y="362" text-anchor="middle" fill="#444" font-size="10">Group-based filtering</text>
  <text x="670" y="379" text-anchor="middle" fill="#444" font-size="10">Federation Hub</text>
  <text x="670" y="400" text-anchor="middle" fill="#e76f51" font-size="9">✗ NOT IMPLEMENTED</text>

  <!-- Data Pipeline -->
  <rect x="60" y="430" width="340" height="145" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="60" y="430" width="5" height="145" rx="2" fill="url(#orangeGrad)"/>
  <text x="85" y="455" fill="#f4a261" font-size="13" font-weight="bold">RECORDING PIPELINE</text>
  <text x="85" y="478" fill="#a0b8d0" font-size="10">recorder.py → TCP CoT stream client</text>
  <text x="85" y="495" fill="#a0b8d0" font-size="10">cot_parser.py → XML stream parser (no lxml)</text>
  <text x="85" y="512" fill="#a0b8d0" font-size="10">SA keepalive every 240s</text>
  <text x="85" y="535" fill="#607890" font-size="10">▸ data/cot_records.db (SQLite WAL)</text>
  <text x="85" y="552" fill="#607890" font-size="10">  sessions · events · geometry_points</text>
  <text x="85" y="569" fill="#607890" font-size="10">  UNIQUE(uid, time) dedup</text>

  <rect x="430" y="430" width="350" height="145" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="430" y="430" width="5" height="145" rx="2" fill="#e76f51"/>
  <text x="455" y="455" fill="#e76f51" font-size="13" font-weight="bold">EXPORT PIPELINE</text>
  <text x="455" y="478" fill="#a0b8d0" font-size="10">exporter.py → SQLite → GeoPackage</text>
  <text x="455" y="495" fill="#a0b8d0" font-size="10">gpkg_writer.py → OGC GPKG (no GDAL)</text>
  <text x="455" y="512" fill="#a0b8d0" font-size="10">gcm_mapper.py → YAML classification</text>
  <text x="455" y="535" fill="#607890" font-size="10">Raw mode: classify by CoT type prefix</text>
  <text x="455" y="552" fill="#607890" font-size="10">GCM mode: config/gcm-mapping.yml rules</text>
  <text x="455" y="569" fill="#607890" font-size="10">Output: .gpkg → QGIS / ArcGIS / GeoPandas</text>

  <!-- Onboarding tools -->
  <rect x="60" y="595" width="720" height="60" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="60" y="595" width="5" height="60" rx="2" fill="#9b59b6"/>
  <text x="85" y="618" fill="#bb77dd" font-size="13" font-weight="bold">ONBOARDING &amp; CONNECTIVITY</text>
  <text x="85" y="640" fill="#a0b8d0" font-size="10">qr.sh → QR code  |  package.sh → .zip pkgs  |  serve → HTTP :9000  |  tailscale → VPN IP</text>

  <!-- Package server -->
  <rect x="60" y="670" width="720" height="50" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="60" y="670" width="5" height="50" rx="2" fill="#2ecc71"/>
  <text x="85" y="693" fill="#2ecc71" font-size="13" font-weight="bold">AUTO-LIFECYCLE</text>
  <text x="85" y="710" fill="#a0b8d0" font-size="10">start→wait→health→record  |  stop→export→shutdown  |  restart / reset cycle</text>

  <!-- ════════ NETWORK / VPN ════════ -->
  <rect x="30" y="795" width="1140" height="35" rx="6" fill="#0d1f35" stroke="#1a3050" stroke-width="1"/>
  <text x="600" y="818" text-anchor="middle" fill="#5a9abf" font-size="12" font-weight="bold" letter-spacing="3">TAILSCALE VPN MESH — 100.x.x.x</text>

  <!-- ════════ CLIENTS ════════ -->
  <rect x="30" y="845" width="1140" height="50" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="120" y="877" text-anchor="middle" fill="#00b4d8" font-size="12" font-weight="bold">iTAK</text>
  <text x="120" y="888" text-anchor="middle" fill="#607890" font-size="9">iPhone</text>
  <text x="290" y="877" text-anchor="middle" fill="#00b4d8" font-size="12" font-weight="bold">ATAK</text>
  <text x="290" y="888" text-anchor="middle" fill="#607890" font-size="9">Android</text>
  <text x="460" y="877" text-anchor="middle" fill="#00b4d8" font-size="12" font-weight="bold">WinTAK</text>
  <text x="460" y="888" text-anchor="middle" fill="#607890" font-size="9">Laptop</text>
  <text x="630" y="877" text-anchor="middle" fill="#00b4d8" font-size="12" font-weight="bold">WebTAK</text>
  <text x="630" y="888" text-anchor="middle" fill="#607890" font-size="9">Browser :8443</text>
  <text x="850" y="877" text-anchor="middle" fill="#f4a261" font-size="12" font-weight="bold">QGIS / ArcGIS</text>
  <text x="850" y="888" text-anchor="middle" fill="#607890" font-size="9">.gpkg consumers</text>
  <text x="1060" y="877" text-anchor="middle" fill="#f4a261" font-size="12" font-weight="bold">External Pipeline</text>
  <text x="1060" y="888" text-anchor="middle" fill="#607890" font-size="9">Downstream ingest</text>

  <!-- ════════ RIGHT SIDE INFO ════════ -->
  <rect x="840" y="100" width="330" height="680" rx="8" fill="none" stroke="#1a3050" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="860" y="125" fill="#5a7a9a" font-size="11" letter-spacing="2">PROJECT CONTEXT</text>

  <rect x="860" y="140" width="290" height="120" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="880" y="185" fill="#a0b8d0" font-size="10">Autonomous Wildland Firefighting</text>
  <text x="880" y="242" fill="#607890" font-size="10">Network: Tailscale 100.117.14.47</text>

  <rect x="860" y="275" width="290" height="110" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="880" y="300" fill="#e0e0e0" font-size="12" font-weight="bold">DESIGN PRINCIPLES</text>
  <text x="880" y="320" fill="#a0b8d0" font-size="10">▸ No GDAL dependency (field laptop)</text>
  <text x="880" y="337" fill="#a0b8d0" font-size="10">▸ Backend-agnostic CLI abstraction</text>
  <text x="880" y="354" fill="#a0b8d0" font-size="10">▸ Auto-lifecycle: start → record → export</text>
  <text x="880" y="371" fill="#a0b8d0" font-size="10">▸ setup.sh → heartbeat start → done</text>

  <rect x="860" y="390" width="290" height="160" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="880" y="415" fill="#e0e0e0" font-size="12" font-weight="bold">KEY TECHNOLOGIES</text>
  <text x="880" y="438" fill="#40916c" font-size="10">▸ Bash CLI + Python tools</text>
  <text x="880" y="455" fill="#40916c" font-size="10">▸ CoT (Cursor on Target) XML protocol</text>
  <text x="880" y="472" fill="#40916c" font-size="10">▸ SQLite (WAL mode) + GeoPackage</text>
  <text x="880" y="489" fill="#40916c" font-size="10">▸ shapely (WKB geometry, no GDAL)</text>
  <text x="880" y="506" fill="#40916c" font-size="10">▸ Docker / systemd / Python venv</text>
  <text x="880" y="523" fill="#40916c" font-size="10">▸ Nginx + RabbitMQ + PostgreSQL (OTS)</text>
  <text x="880" y="540" fill="#40916c" font-size="10">▸ mTLS certificates (OTS)</text>

  <rect x="860" y="565" width="290" height="120" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="880" y="590" fill="#e0e0e0" font-size="12" font-weight="bold">NOT YET IMPLEMENTED</text>
  <text x="880" y="610" fill="#e76f51" font-size="10">✗ TAK Server (Enterprise) backend</text>
  <text x="880" y="627" fill="#e76f51" font-size="10">✗ Federation support</text>
  <text x="880" y="644" fill="#e76f51" font-size="10">✗ GPKG import pipeline</text>
  <text x="880" y="661" fill="#e76f51" font-size="10">✗ Export time filters / live mode</text>
  <text x="880" y="678" fill="#e76f51" font-size="10">✗ CoT injection / simulation</text>

  <!-- Data flow arrows -->
  <line x1="170" y1="410" x2="170" y2="430" stroke="#40916c" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="420" y1="410" x2="420" y2="430" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="500" x2="430" y2="500" stroke="#f4a261" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Version -->
  <text x="1170" y="18" text-anchor="end" fill="#3a5570" font-size="9">v2 · Feb 2026</text>
</svg>