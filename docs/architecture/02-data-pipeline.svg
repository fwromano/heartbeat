<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Consolas, 'Courier New', monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#122040"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2d4a"/>
      <stop offset="100%" style="stop-color:#152238"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00b4d8"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f4a261"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#40916c"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="url(#bgGrad)"/>

  <text x="600" y="40" text-anchor="middle" fill="#e0e0e0" font-size="20" font-weight="bold" letter-spacing="3">DATA PIPELINE — RECORD → EXPORT</text>
  <text x="600" y="60" text-anchor="middle" fill="#5a7a9a" font-size="11" letter-spacing="1">CoT stream ingestion through GeoPackage output</text>
  <line x1="200" y1="72" x2="1000" y2="72" stroke="#1a3050" stroke-width="1"/>

  <!-- PHASE 1: TAK Server Source -->
  <rect x="40" y="95" width="200" height="100" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="40" y="95" width="200" height="4" rx="2" fill="#00b4d8"/>
  <text x="140" y="125" text-anchor="middle" fill="#00b4d8" font-size="13" font-weight="bold">TAK SERVER</text>
  <text x="140" y="148" text-anchor="middle" fill="#a0b8d0" font-size="10">FreeTAK :8087 (TCP)</text>
  <text x="140" y="165" text-anchor="middle" fill="#a0b8d0" font-size="10">OpenTAK :8088 (TCP)</text>
  <text x="140" y="182" text-anchor="middle" fill="#607890" font-size="9">Continuous CoT XML stream</text>

  <!-- Arrow 1 -->
  <line x1="240" y1="145" x2="290" y2="145" stroke="#00b4d8" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <text x="265" y="138" text-anchor="middle" fill="#00b4d8" font-size="8">TCP</text>

  <!-- PHASE 2: Recorder -->
  <rect x="300" y="95" width="250" height="100" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="300" y="95" width="250" height="4" rx="2" fill="#f4a261"/>
  <text x="425" y="120" text-anchor="middle" fill="#f4a261" font-size="13" font-weight="bold">recorder.py</text>
  <text x="425" y="143" text-anchor="middle" fill="#a0b8d0" font-size="10">TCP socket client (daemon)</text>
  <text x="425" y="160" text-anchor="middle" fill="#a0b8d0" font-size="10">SA keepalive every 240s</text>
  <text x="425" y="177" text-anchor="middle" fill="#a0b8d0" font-size="10">Auto-reconnect on disconnect</text>

  <!-- Arrow 2 -->
  <line x1="425" y1="195" x2="425" y2="235" stroke="#f4a261" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="445" y="218" fill="#f4a261" font-size="8">feed()</text>

  <!-- PHASE 3: Parser -->
  <rect x="300" y="245" width="250" height="90" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="300" y="245" width="250" height="4" rx="2" fill="#e76f51"/>
  <text x="425" y="272" text-anchor="middle" fill="#e76f51" font-size="13" font-weight="bold">cot_parser.py</text>
  <text x="425" y="295" text-anchor="middle" fill="#a0b8d0" font-size="10">CotStreamParser — buffers partial TCP</text>
  <text x="425" y="312" text-anchor="middle" fill="#a0b8d0" font-size="10">yields complete &lt;event&gt;...&lt;/event&gt; XML</text>
  <text x="425" y="329" text-anchor="middle" fill="#607890" font-size="9">stdlib only — no lxml dependency</text>

  <!-- Arrow 3 -->
  <line x1="425" y1="335" x2="425" y2="375" stroke="#e76f51" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="450" y="358" fill="#e76f51" font-size="8">parse_cot_event()</text>

  <!-- PHASE 4: SQLite DB -->
  <rect x="280" y="385" width="290" height="178" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="280" y="385" width="5" height="178" rx="2" fill="#40916c"/>
  <text x="305" y="410" fill="#40916c" font-size="13" font-weight="bold">data/cot_records.db</text>
  <text x="305" y="430" fill="#607890" font-size="10">SQLite — WAL mode</text>

  <!-- Table: recording_sessions -->
  <rect x="300" y="445" width="245" height="38" rx="3" fill="#1e3350"/>
  <text x="310" y="462" fill="#00b4d8" font-size="10" font-weight="bold">recording_sessions</text>
  <text x="310" y="477" fill="#607890" font-size="9">session_id · start · end · event_count</text>

  <!-- Table: cot_events -->
  <rect x="300" y="485" width="245" height="55" rx="3" fill="#1e3350"/>
  <text x="310" y="502" fill="#f4a261" font-size="10" font-weight="bold">cot_events</text>
  <text x="310" y="520" fill="#607890" font-size="9">uid · type · callsign · lat · lon · hae</text>
  <text x="310" y="533" fill="#607890" font-size="9">UNIQUE(uid, time) — INSERT OR IGNORE dedup</text>

  <!-- Table: geometry_points -->
  <rect x="300" y="535" width="245" height="20" rx="3" fill="#1e3350"/>
  <text x="310" y="546" fill="#bb77dd" font-size="10" font-weight="bold">cot_geometry_points</text>

  <!-- ══════ EXPORT SIDE ══════ -->
  <!-- Arrow to exporter -->
  <line x1="570" y1="465" x2="640" y2="465" stroke="#40916c" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="605" y="458" text-anchor="middle" fill="#40916c" font-size="8">query</text>

  <!-- PHASE 5: Exporter -->
  <rect x="650" y="95" width="250" height="188" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="650" y="95" width="250" height="4" rx="2" fill="#40916c"/>
  <text x="775" y="120" text-anchor="middle" fill="#40916c" font-size="13" font-weight="bold">exporter.py</text>

  <!-- Raw mode -->
  <rect x="670" y="135" width="210" height="55" rx="4" fill="#1e3350"/>
  <text x="680" y="152" fill="#00b4d8" font-size="10" font-weight="bold">RAW MODE (default)</text>
  <text x="680" y="167" fill="#a0b8d0" font-size="9">a-f-*, a-n-*    → positions (Point)</text>
  <text x="680" y="180" fill="#a0b8d0" font-size="9">b-m-p-*          → markers (Point)</text>

  <!-- GCM mode -->
  <rect x="670" y="198" width="210" height="55" rx="4" fill="#1e3350"/>
  <text x="680" y="215" fill="#f4a261" font-size="10" font-weight="bold">GCM MODE (--gcm)</text>
  <text x="680" y="230" fill="#a0b8d0" font-size="9">gcm_mapper.py loads</text>
  <text x="680" y="243" fill="#a0b8d0" font-size="9">config/gcm-mapping.yml</text>

  <text x="775" y="270" text-anchor="middle" fill="#607890" font-size="9">classify → layer → geometry type</text>

  <!-- Arrow to gpkg_writer -->
  <line x1="775" y1="275" x2="775" y2="315" stroke="#40916c" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- PHASE 6: GPKG Writer -->
  <rect x="650" y="325" width="250" height="138" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="650" y="325" width="250" height="4" rx="2" fill="#2ecc71"/>
  <text x="775" y="352" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">gpkg_writer.py</text>
  <text x="775" y="375" text-anchor="middle" fill="#a0b8d0" font-size="10">OGC GeoPackage writer</text>
  <text x="775" y="395" text-anchor="middle" fill="#607890" font-size="10">GP binary header (40 bytes) + WKB</text>
  <text x="775" y="412" text-anchor="middle" fill="#607890" font-size="10">via shapely + sqlite3</text>
  <text x="775" y="435" text-anchor="middle" fill="#e76f51" font-size="10" font-weight="bold">NO GDAL DEPENDENCY</text>
  <text x="775" y="450" text-anchor="middle" fill="#607890" font-size="9">EPSG:4326 WGS84</text>

  <!-- Arrow to output -->
  <line x1="775" y1="455" x2="775" y2="505" stroke="#2ecc71" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- PHASE 7: Output -->
  <rect x="650" y="515" width="250" height="76" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="650" y="515" width="250" height="4" rx="2" fill="#bb77dd"/>
  <text x="775" y="542" text-anchor="middle" fill="#bb77dd" font-size="13" font-weight="bold">output.gpkg</text>
  <text x="775" y="565" text-anchor="middle" fill="#a0b8d0" font-size="10">QGIS · ArcGIS · GeoPandas</text>
  <text x="775" y="580" text-anchor="middle" fill="#607890" font-size="9">Any OGC-compliant tool</text>

  <!-- Connect DB to exporter -->
  <path d="M 570 465 L 610 465 L 610 200 L 650 200" fill="none" stroke="#40916c" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- ══════ LEGEND / NOTES ══════ -->
  <rect x="40" y="250" width="230" height="290" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="60" y="275" fill="#e0e0e0" font-size="12" font-weight="bold">CoT EVENT FIELDS</text>
  <text x="60" y="298" fill="#00b4d8" font-size="10">uid</text><text x="130" y="298" fill="#607890" font-size="10">unique event ID</text>
  <text x="60" y="315" fill="#00b4d8" font-size="10">type</text><text x="130" y="315" fill="#607890" font-size="10">CoT type string</text>
  <text x="60" y="332" fill="#00b4d8" font-size="10">how</text><text x="130" y="332" fill="#607890" font-size="10">origin method</text>
  <text x="60" y="349" fill="#00b4d8" font-size="10">callsign</text><text x="130" y="349" fill="#607890" font-size="10">device name</text>
  <text x="60" y="366" fill="#00b4d8" font-size="10">lat/lon/hae</text><text x="130" y="366" fill="#607890" font-size="10">WGS84 position</text>
  <text x="60" y="383" fill="#00b4d8" font-size="10">ce/le</text><text x="130" y="383" fill="#607890" font-size="10">error ellipse</text>
  <text x="60" y="400" fill="#00b4d8" font-size="10">detail_xml</text><text x="130" y="400" fill="#607890" font-size="10">raw XML blob</text>

  <line x1="60" y1="415" x2="250" y2="415" stroke="#1a3050" stroke-width="1"/>
  <text x="60" y="435" fill="#e0e0e0" font-size="12" font-weight="bold">GEOMETRY TYPES</text>
  <text x="60" y="455" fill="#40916c" font-size="10">a-f-*, a-n-*</text><text x="170" y="455" fill="#607890" font-size="10">Point</text>
  <text x="60" y="472" fill="#40916c" font-size="10">b-m-p-*</text><text x="170" y="472" fill="#607890" font-size="10">Point</text>
  <text x="60" y="489" fill="#40916c" font-size="10">b-m-r-*, u-d-r-*</text><text x="170" y="489" fill="#607890" font-size="10">LineString</text>
  <text x="60" y="506" fill="#40916c" font-size="10">u-d-f-*</text><text x="170" y="506" fill="#607890" font-size="10">Polygon</text>
  <text x="60" y="526" fill="#607890" font-size="9">CoT type prefix → geometry mapping</text>

  <!-- Auto-export note -->
  <rect x="40" y="560" width="230" height="82" rx="6" fill="#1a2510" stroke="#40916c" stroke-width="1"/>
  <text x="60" y="582" fill="#40916c" font-size="11" font-weight="bold">AUTO-EXPORT</text>
  <text x="60" y="600" fill="#a0b8d0" font-size="10">heartbeat stop triggers</text>
  <text x="60" y="615" fill="#a0b8d0" font-size="10">auto-export if DB exists</text>
  <text x="60" y="630" fill="#607890" font-size="9">→ data/cot_export_*.gpkg</text>

  <!-- Phase labels along bottom -->
  <rect x="40" y="660" width="1120" height="30" rx="4" fill="#0d1f35"/>
  <text x="140" y="680" text-anchor="middle" fill="#00b4d8" font-size="10">① INGEST</text>
  <text x="425" y="680" text-anchor="middle" fill="#f4a261" font-size="10">② PARSE &amp; STORE</text>
  <text x="775" y="680" text-anchor="middle" fill="#40916c" font-size="10">③ CLASSIFY &amp; EXPORT</text>
  <text x="1060" y="680" text-anchor="middle" fill="#bb77dd" font-size="10">④ CONSUME</text>

  <text x="1170" y="18" text-anchor="end" fill="#3a5570" font-size="9">v2 · Feb 2026</text>
</svg>